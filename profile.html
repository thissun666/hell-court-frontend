<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阴曹地府 · 个人空间</title>
    <style>
        /* ===== 主题变量（与 forum.html 完全一致） ===== */
        :root {
            --bg-body: #0b0a0c;
            --bg-header: rgba(30, 26, 34, 0.85);
            --border-header: #3d2a47;
            --shadow-header: 0 0 30px rgba(60, 40, 70, 0.3);
            --color-logo: #7c5f8c;
            --color-link: #c9a7d9;
            --color-link-hover: #e0d0e8;
            --color-text: #b8a7c9;
            --color-meta: #6a5a6e;
            --border-post: rgba(124, 95, 140, 0.35);
            --bg-post-hover: rgba(124, 95, 140, 0.08);
            --border-post-hover: #9b7ab0;
            --bg-btn-primary: #7c5f8c;
            --bg-btn-primary-hover: #9b7ab0;
            --shadow-btn: 0 0 30px rgba(124, 95, 140, 0.3);
            --color-danger: #d4a0a0;
            --color-success: #a0d4a0;
            --bg-btn-danger: #4a2a2e;
            --bg-btn-danger-hover: #6a2a2e;
        }
        [data-theme="red"] {
            --bg-body: #0a0a0a;
            --bg-header: rgba(80, 0, 0, 0.6);
            --border-header: rgba(255, 50, 50, 0.35);
            --shadow-header: 0 0 40px rgba(255, 0, 0, 0.15);
            --color-logo: #ff4444;
            --color-link: #ff9999;
            --color-link-hover: #ffcccc;
            --color-text: #d4c4c9;
            --color-meta: #886a6a;
            --border-post: rgba(255, 50, 50, 0.30);
            --bg-post-hover: rgba(255, 50, 50, 0.08);
            --border-post-hover: rgba(255, 80, 80, 0.55);
            --bg-btn-primary: radial-gradient(circle at 30% 30%, #cc2222, #880000);
            --bg-btn-primary-hover: radial-gradient(circle at 30% 30%, #ee3333, #aa0000);
            --shadow-btn: 0 0 50px rgba(255, 0, 0, 0.25);
            --color-danger: #d4a0a0;
            --color-success: #80d4a0;
            --bg-btn-danger: #4a2a2e;
            --bg-btn-danger-hover: #6a2a2e;
        }
        [data-theme="green"] {
            --bg-body: #0a0a0a;
            --bg-header: rgba(0, 40, 0, 0.6);
            --border-header: rgba(50, 255, 50, 0.35);
            --shadow-header: 0 0 40px rgba(0, 255, 0, 0.15);
            --color-logo: #44ff44;
            --color-link: #99ff99;
            --color-link-hover: #ccffcc;
            --color-text: #c4d4c4;
            --color-meta: #6a8a6a;
            --border-post: rgba(50, 255, 50, 0.30);
            --bg-post-hover: rgba(50, 255, 50, 0.08);
            --border-post-hover: rgba(80, 255, 80, 0.55);
            --bg-btn-primary: radial-gradient(circle at 30% 30%, #22cc22, #008800);
            --bg-btn-primary-hover: radial-gradient(circle at 30% 30%, #33ee33, #00aa00);
            --shadow-btn: 0 0 50px rgba(0, 255, 0, 0.25);
            --color-danger: #a0d4a0;
            --color-success: #80d4a0;
            --bg-btn-danger: #2a4a2a;
            --bg-btn-danger-hover: #2a6a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-body);
            font-family: 'KaiTi', serif;
            color: var(--color-text);
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 800px; margin: 0 auto; }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--color-link);
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .back-btn:hover {
            color: var(--color-link-hover);
            text-shadow: 0 0 20px var(--color-link);
        }
        .pinned-badge {
            color: #ff4444;
            font-size: 0.75rem;
            font-weight: bold;
            background: rgba(255, 68, 68, 0.15);
            padding: 2px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 68, 68, 0.3);
            white-space: nowrap;
            margin-left: 10px;
        }

        .profile-card {
            background: var(--bg-header);
            backdrop-filter: blur(4px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-header);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            transition: background 0.3s, border 0.3s;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
            background: #4a2a5e;
        }
        .info { flex: 1; }
        .info .name {
            font-size: 1.8rem;
            color: var(--color-text);
        }
        .info .tags {
            display: flex;
            gap: 15px;
            margin: 8px 0 5px;
            flex-wrap: wrap;
        }
        .info .tags span {
            background: rgba(0,0,0,0.3);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--color-meta);
            border: 1px solid var(--border-header);
        }
        .info .meta {
            font-size: 0.9rem;
            color: var(--color-meta);
        }
        .stat {
            text-align: center;
            padding: 0 20px;
            border-left: 1px solid var(--border-header);
        }
        .stat .num {
            font-size: 2rem;
            color: var(--color-link);
        }
        .stat .label {
            font-size: 0.8rem;
            color: var(--color-meta);
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
        .post-item {
            background: transparent;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-post);
            position: relative;
            transition: 0.3s ease;
        }
        .post-item:hover {
            background: var(--bg-post-hover);
            border-color: var(--border-post-hover);
            box-shadow: 0 0 30px var(--border-post-hover);
        }
        .post-item .title {
            font-size: 1.1rem;
            color: var(--color-text);
            margin-bottom: 5px;
        }
        .post-item .content {
            color: var(--color-meta);
            font-size: 0.95rem;
            word-break: break-word;
        }
        .post-item .post-meta {
            font-size: 0.8rem;
            color: var(--color-meta);
            margin-top: 8px;
        }
        .delete-btn {
            position: absolute;
            right: 15px;
            top: 15px;
            background: var(--bg-btn-danger);
            border: 1px solid var(--border-header);
            color: var(--color-danger);
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            font-family: inherit;
        }
        .delete-btn:hover {
            background: var(--bg-btn-danger-hover);
            color: #ffb0b0;
            box-shadow: 0 0 15px var(--color-danger);
        }

        .empty { text-align: center; padding: 40px; color: var(--color-meta); }
        .loading { text-align: center; padding: 20px; color: var(--color-meta); }

        .pagination {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pagination button {
            background: transparent;
            border: 1px solid var(--border-post);
            padding: 6px 14px;
            border-radius: 6px;
            color: var(--color-text);
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        .pagination button:hover {
            background: var(--bg-post-hover);
            border-color: var(--border-post-hover);
            box-shadow: 0 0 20px var(--border-post-hover);
        }
        .pagination button.active {
            background: var(--bg-btn-primary);
            border-color: var(--color-link);
            color: #fff;
            box-shadow: var(--shadow-btn);
        }
    </style>
</head>
<body>
<div class="container">
    <a class="back-btn" href="/forum.html">← 返回幽冥论坛</a>

    <!-- 个人名片 -->
    <div class="profile-card" id="profileCard">
        <div class="avatar" id="avatar">?</div>
        <div class="info">
            <div class="name" id="nickname">加载中...</div>
            <div class="display-name" id="displayName" style="color:var(--color-muted);font-size:0.9rem;margin-top:4px;">
                🏷️ 昵称：<span id="displayNameText">-</span>
            </div>
            <div class="tags">
                <span id="realm">修为</span>
                <span id="faction">势力</span>
            </div>
            <div class="meta" id="createdAt">注册于：未知</div>
        </div>
        <div class="stat">
            <div class="num" id="postCount">0</div>
            <div class="label">📜 帖子</div>
        </div>
        <div class="stat">
            <div class="num" id="popularity">0</div>
            <div class="label">⭐ 名气值</div>
        </div>
    </div>

    <!-- 帖子列表 -->
    <h3 style="margin-bottom:15px; color:var(--color-link);">📖 发布的帖子</h3>
    <div class="post-list" id="postList">
        <div class="loading">⚡ 正在召唤帖子...</div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>
</div>

<script>
    // ===== 添加后端 API 基础地址 =====
    const API_BASE = 'https://hell-court-forum-production-caf1.up.railway.app';

    // ===== 主题读取 =====
    const savedTheme = localStorage.getItem('forumTheme') || 'purple';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // ===== 业务逻辑 =====
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId');
    if (!userId) {
        alert('未指定用户，返回论坛');
        window.location.href = '/forum.html';
    }

    const currentUserId = localStorage.getItem('userId');
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
    }

    let currentPage = 0;
    const pageSize = 10;
    let totalPages = 0;

    function getAuthHeaders() {
        return { 'Authorization': `Bearer ${token}` };
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getAvatarChar(name) {
        return name ? name.charAt(0) : '?';
    }

    function getAvatarColor(name) {
        const colors = ['#4a2a5e', '#2a4a5e', '#5e4a2a', '#2a5e4a', '#5e2a3a'];
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        return colors[Math.abs(hash) % colors.length];
    }

    async function loadProfile() {
        try {
            const response = await fetch(`${API_BASE}/api/users/${userId}/profile`);
            const data = await response.json();
            if (data.code === 200) {
                const p = data.data;
                document.getElementById('nickname').textContent = p.nickname;
                document.getElementById('realm').textContent = `⚡ ${p.realm || '鬼卒'}`;
                document.getElementById('faction').textContent = `🏛️ ${p.faction || '无'}`;
                document.getElementById('postCount').textContent = p.postCount || 0;
                document.getElementById('createdAt').textContent = `注册于：${new Date(p.createdAt).toLocaleString()}`;
                document.getElementById('displayNameText').textContent = p.displayName || '未设置';
                document.getElementById('popularity').textContent = p.popularity || 0;
                const avatar = document.getElementById('avatar');
                avatar.textContent = getAvatarChar(p.nickname);
                avatar.style.background = getAvatarColor(p.nickname);
            } else {
                document.getElementById('nickname').textContent = '❌ 加载失败';
            }
        } catch (error) {
            console.error(error);
            document.getElementById('nickname').textContent = '❌ 网络错误';
        }
    }

    async function loadPosts(page = 0) {
        const listEl = document.getElementById('postList');
        listEl.innerHTML = '<div class="loading">⚡ 正在召唤帖子...</div>';

        try {
            const response = await fetch(`${API_BASE}/api/users/${userId}/posts?page=${page}&size=${pageSize}`);
            const data = await response.json();
            if (data.code === 200) {
                const posts = data.data || [];
                totalPages = Math.ceil(data.total / pageSize) || 0;
                renderPosts(posts);
                renderPagination(page);
            } else {
                listEl.innerHTML = `<div class="empty">❌ 加载失败：${data.message}</div>`;
            }
        } catch (error) {
            listEl.innerHTML = '<div class="empty">❌ 网络异常</div>';
            console.error(error);
        }
    }

    function renderPosts(posts) {
        const listEl = document.getElementById('postList');
        if (!posts || posts.length === 0) {
            listEl.innerHTML = '<div class="empty">📭 这位鬼魂尚未留下任何帖子</div>';
            return;
        }

        const sortedPosts = [...posts].sort((a, b) => {
            const aPinned = (a.id === 1) || (a.title && a.title.includes('天地初开'));
            const bPinned = (b.id === 1) || (b.title && b.title.includes('天地初开'));
            if (aPinned && !bPinned) return -1;
            if (!aPinned && bPinned) return 1;
            return 0;
        });

        let html = '';
        const isOwner = (Number(currentUserId) === Number(userId));
        sortedPosts.forEach(post => {
            const isPinned = (post.id === 1) || (post.title && post.title.includes('天地初开'));
            let timeDisplay = post.displayTime || '未知时间';
            if (isPinned) timeDisplay = '📌 洪荒妖庭末期';
            const viewCount = post.viewCount || 0;
            const likeCount = post.likeCount || 0;
            const viewDisplay = isPinned ? '9999+' : (viewCount >= 9999 ? '9999+' : viewCount);
            const likeDisplay = isPinned ? '9999+' : (likeCount >= 9999 ? '9999+' : likeCount);

            html += `
                <div class="post-item" data-postid="${post.id}">
                    <div class="title" style="display:flex;justify-content:space-between;align-items:center;">
                        <span>${escapeHtml(post.title)}</span>
                        ${isPinned ? `<span class="pinned-badge">📌 置顶</span>` : ''}
                    </div>
                    <div class="content">${escapeHtml(post.content)}</div>
                    <div class="post-meta">
                        👁️ ${viewDisplay} 次观看 · ❤️ ${likeDisplay} 点赞 · 📅 ${timeDisplay}
                    </div>
                    ${isOwner ? `<button class="delete-btn" data-id="${post.id}">🗑️ 删除</button>` : ''}
                </div>
            `;
        });
        listEl.innerHTML = html;

        if (isOwner) {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const postId = this.dataset.id;
                    if (!confirm('确定要删除这篇帖子吗？它将永远消失于轮回中。')) return;
                    await deletePost(postId);
                });
            });
        }
    }

    async function deletePost(postId) {
        try {
            const response = await fetch(`${API_BASE}/api/posts/${postId}`, {
                method: 'DELETE',
                headers: getAuthHeaders()
            });
            const data = await response.json();
            if (data.code === 200) {
                alert('✅ 帖子已删除！');
                loadPosts(currentPage);
                loadProfile();
            } else {
                alert(`❌ 删除失败：${data.message}`);
            }
        } catch (error) {
            alert('❌ 网络错误');
            console.error(error);
        }
    }

    function renderPagination(current) {
        const el = document.getElementById('pagination');
        if (totalPages <= 1) {
            el.innerHTML = '';
            return;
        }
        let html = '';
        for (let i = 0; i < totalPages; i++) {
            html += `<button data-page="${i}" class="${i === current ? 'active' : ''}">${i + 1}</button>`;
        }
        el.innerHTML = html;
        el.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                const page = parseInt(this.dataset.page);
                currentPage = page;
                loadPosts(page);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    }

    loadProfile();
    loadPosts(0);
</script>
</body>
</html>
